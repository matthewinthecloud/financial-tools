<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #0d1117;
      --surface:        #161b22;
      --surface-hover:  #1c2128;
      --border:         #30363d;
      --border-hover:   #484f58;
      --text-primary:   #e6edf3;
      --text-secondary: #8b949e;
      --text-muted:     #6e7681;
      --green:          #3fb950;
      --green-dim:      #1a3d22;
      --red:            #f85149;
      --red-dim:        #3d1a1a;
      --accent:         #58a6ff;
    }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 2rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-left h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .header-left p {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.4rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.fetching {
      background: var(--accent);
      animation: pulse 0.9s ease-in-out infinite;
    }

    .status-dot.error {
      background: var(--red);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.85); }
    }

    /* Countdown bar */
    .countdown-bar {
      width: 120px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .countdown-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 100%;
      transition: width 1s linear;
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: var(--border-hover);
      background: var(--surface-hover);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.1rem;
    }

    .asset-name {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }

    .asset-symbol {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--bg);
      padding: 2px 7px;
      border-radius: 5px;
      border: 1px solid var(--border);
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }

    .price {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.55rem;
    }

    .change {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .change.positive { color: var(--green); }
    .change.negative { color: var(--red); }
    .change.neutral  { color: var(--text-muted); }

    .change-arrow {
      font-size: 0.7rem;
    }

    /* Bottom accent stripe */
    .card-stripe {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }

    .card-stripe.positive { background: var(--green); opacity: 0.5; }
    .card-stripe.negative { background: var(--red);   opacity: 0.5; }

    /* ── Skeleton shimmer ── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position:  400px 0; }
    }

    .skeleton {
      background: linear-gradient(90deg,
        var(--border) 25%,
        var(--border-hover) 50%,
        var(--border) 75%
      );
      background-size: 400px 100%;
      animation: shimmer 1.6s infinite;
      border-radius: 5px;
    }

    .skeleton-price {
      height: 2rem;
      width: 150px;
      margin-bottom: 0.55rem;
    }

    .skeleton-change {
      height: 0.85rem;
      width: 110px;
    }

    /* ── Error ── */
    .error-msg {
      font-size: 0.82rem;
      color: var(--red);
      margin-top: 0.4rem;
    }

    .price.unavailable {
      color: var(--text-muted);
      font-size: 1.4rem;
    }

    /* ── Footer ── */
    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    @media (max-width: 480px) {
      body { padding: 1rem; }
      .price { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Market Dashboard</h1>
    <p>Live market prices</p>
  </div>
  <div class="header-right">
    <div class="status-row">
      <div class="status-dot" id="statusDot"></div>
      <span id="lastUpdated">Loading…</span>
    </div>
    <div class="status-row" id="countdownRow" style="display:none">
      <span id="countdownLabel" style="font-size:0.75rem;color:var(--text-muted)"></span>
      <div class="countdown-bar">
        <div class="countdown-fill" id="countdownFill"></div>
      </div>
    </div>
  </div>
</header>

<div class="grid" id="grid"></div>

<footer id="footer"></footer>

<script>
  const ASSETS = [
    { symbol: 'GC=F',   name: 'Gold',               unit: 'USD / oz'  },
    { symbol: 'CL=F',   name: 'WTI Crude Oil',       unit: 'USD / bbl' },
    { symbol: '^GSPC',  name: 'S&P 500',             unit: 'Index'     },
    { symbol: '^TNX',   name: '10-Year Treasury',    unit: 'Yield %'   },
  ];

  const REFRESH_SEC  = 30;
  const YF_BASE      = 'https://query2.finance.yahoo.com/v8/finance/chart/';
  const PROXY_PREFIX = 'https://corsproxy.io/?url=';

  let countdownSec   = REFRESH_SEC;
  let countdownTimer = null;

  // ── Formatting helpers ──────────────────────────────────────────────────────

  function fmtPrice(price, symbol) {
    if (symbol === '^TNX') {
      return price.toFixed(3) + '%';
    }
    if (symbol === '^GSPC') {
      return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    return '$' + price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function fmtChange(change, pct, symbol) {
    const sign   = change >= 0 ? '+' : '';
    const isTnx  = symbol === '^TNX';
    const isSPX  = symbol === '^GSPC';
    const prefix = (isTnx || isSPX) ? '' : '$';
    const suffix = isTnx ? '%' : '';
    const abs    = Math.abs(change);
    const dp     = isTnx ? 3 : 2;
    return `${sign}${prefix}${abs.toFixed(dp)}${suffix} (${sign}${pct.toFixed(2)}%)`;
  }

  // ── Fetch ───────────────────────────────────────────────────────────────────

  async function fetchOne(symbol) {
    const target = YF_BASE + encodeURIComponent(symbol) + '?interval=1m&range=1d';
    const urls   = [target, PROXY_PREFIX + encodeURIComponent(target)];
    let lastErr;

    for (const url of urls) {
      try {
        const res = await fetch(url, { signal: AbortSignal.timeout(9000) });
        if (!res.ok) { lastErr = new Error(`HTTP ${res.status}`); continue; }
        const json = await res.json();
        const meta = json?.chart?.result?.[0]?.meta;
        if (!meta?.regularMarketPrice) { lastErr = new Error('No price in response'); continue; }

        const price  = meta.regularMarketPrice;
        const prev   = meta.chartPreviousClose ?? meta.previousClose ?? price;
        const change = meta.regularMarketChange       ?? (price - prev);
        const pct    = meta.regularMarketChangePercent ?? ((price - prev) / prev * 100);
        const name   = meta.longName ?? meta.shortName ?? symbol;

        return { price, prev, change, pct, longName: name };
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr ?? new Error('Unknown error');
  }

  // ── Render ──────────────────────────────────────────────────────────────────

  function renderSkeleton() {
    document.getElementById('grid').innerHTML = ASSETS.map(a => `
      <div class="card" id="card-${safeId(a.symbol)}">
        <div class="card-header">
          <span class="asset-name">${a.name}</span>
          <span class="asset-symbol">${a.symbol}</span>
        </div>
        <div class="skeleton skeleton-price"></div>
        <div class="skeleton skeleton-change"></div>
      </div>
    `).join('');
  }

  function renderCard(asset, result) {
    const el = document.getElementById('card-' + safeId(asset.symbol));
    if (!el) return;

    let priceHtml, changeHtml, stripeClass;

    if (result.error) {
      priceHtml  = `<div class="price unavailable">—</div>`;
      changeHtml = `<div class="error-msg">Failed to load data</div>`;
      stripeClass = '';
    } else {
      const { price, change, pct } = result;
      const dir  = change >= 0 ? 'positive' : 'negative';
      const arrow = change >= 0 ? '▲' : '▼';
      stripeClass = dir;
      priceHtml  = `<div class="price">${fmtPrice(price, asset.symbol)}</div>`;
      changeHtml = `
        <div class="change ${dir}">
          <span class="change-arrow">${arrow}</span>
          <span>${fmtChange(change, pct, asset.symbol)}</span>
        </div>`;
    }

    el.innerHTML = `
      <div class="card-header">
        <span class="asset-name">${asset.name}</span>
        <span class="asset-symbol">${asset.symbol}</span>
      </div>
      ${priceHtml}
      ${changeHtml}
      ${stripeClass ? `<div class="card-stripe ${stripeClass}"></div>` : ''}
    `;
  }

  function safeId(symbol) {
    return symbol.replace(/[^a-z0-9]/gi, '_');
  }

  // ── Refresh cycle ───────────────────────────────────────────────────────────

  async function refresh() {
    const dot = document.getElementById('statusDot');
    dot.className = 'status-dot fetching';
    document.getElementById('lastUpdated').textContent = 'Fetching…';
    document.getElementById('countdownRow').style.display = 'none';

    // Render skeletons then fetch in parallel
    renderSkeleton();

    const results = await Promise.allSettled(ASSETS.map(a => fetchOne(a.symbol)));

    let anyError = false;
    results.forEach((r, i) => {
      if (r.status === 'fulfilled') {
        renderCard(ASSETS[i], r.value);
      } else {
        anyError = true;
        renderCard(ASSETS[i], { error: r.reason?.message ?? 'Unknown' });
      }
    });

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    dot.className = 'status-dot' + (anyError ? ' error' : '');

    // Start countdown
    countdownSec = REFRESH_SEC;
    startCountdown();

    const footer = document.getElementById('footer');
    footer.textContent = `Data via Yahoo Finance · ${now.toLocaleDateString([], { weekday:'short', month:'short', day:'numeric', year:'numeric' })}`;
  }

  function startCountdown() {
    clearInterval(countdownTimer);
    document.getElementById('countdownRow').style.display = 'flex';

    const fill  = document.getElementById('countdownFill');
    const label = document.getElementById('countdownLabel');

    fill.style.transition = 'none';
    fill.style.width = '100%';

    // Trigger reflow so the transition reset takes effect
    void fill.offsetWidth;

    fill.style.transition = `width ${REFRESH_SEC}s linear`;
    fill.style.width = '0%';

    countdownTimer = setInterval(() => {
      countdownSec--;
      label.textContent = `${countdownSec}s`;
      if (countdownSec <= 0) {
        clearInterval(countdownTimer);
        refresh();
      }
    }, 1000);
  }

  // Kick off on load
  refresh();
</script>
</body>
</html>
